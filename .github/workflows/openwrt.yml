name: Build OpenWrt

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v5

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          df -h

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib gettext \
          git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

      - name: Clone OpenWrt
        run: |
          git clone https://github.com/openwrt/openwrt.git source
          cd source
          git checkout openwrt-24.10

      # 🔥 关键步骤：添加第三方源
      - name: Add custom feeds
        run: |
          cd source


          # 👉 官方基础依赖（必须）
          echo 'src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main' >> feeds.conf.default

          # 👉 你的仓库（覆盖 luci）
          echo 'src-git passwall_luci https://github.com/anwugos/openwrt-passwall.git;main' >> feeds.conf.default

          # 👉 Argon
          echo 'src-git argon https://github.com/jerrykuku/luci-theme-argon.git' >> feeds.conf.default
          echo 'src-git argon_config https://github.com/jerrykuku/luci-app-argon-config.git' >> feeds.conf.default

      - name: Update feeds
        run: |
          cd source
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load config
        run: |
          cp configs/newifi.config source/.config
          cd source
          make defconfig

      - name: Download
        run: |
          cd source
          make download -j8 || make download -j1 V=s

      - name: Build
        run: |
          cd source
          make -j$(nproc) || make -j1 V=s

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: source/bin/targets/
