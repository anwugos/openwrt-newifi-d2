name: Build OpenWrt

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v5

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo docker image prune -af || true
          df -h

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison g++ gawk gcc-multilib gettext \
            git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev \
            file wget subversion swig time

      - name: Clone OpenWrt
        run: |
          git clone https://github.com/openwrt/openwrt.git source
          cd source
          git checkout openwrt-24.10

      - name: Add custom feeds
        run: |
          cd source

          # Passwall 官方依赖包
          echo 'src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main' >> feeds.conf.default

          # Argon 主题
          echo 'src-git argon https://github.com/jerrykuku/luci-theme-argon.git' >> feeds.conf.default
          echo 'src-git argon_config https://github.com/jerrykuku/luci-app-argon-config.git' >> feeds.conf.default

          echo "===== feeds.conf.default ====="
          cat feeds.conf.default

      - name: Update feeds
        run: |
          cd source
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Use my custom luci-app-passwall
        run: |
          cd source

          # 只使用你自己仓库里的 luci-app-passwall，不使用里面的旧核心包
          git clone https://github.com/anwugos/openwrt-passwall.git custom_passwall

          mkdir -p package/custom
          rm -rf package/custom/luci-app-passwall
          cp -r custom_passwall/luci-app-passwall package/custom/luci-app-passwall

          echo "===== custom luci-app-passwall loaded ====="
          ls -lah package/custom/luci-app-passwall

      - name: Load config
        run: |
          cp configs/newifi.config source/.config
          cd source
          make defconfig

          echo "===== final selected packages ====="
          grep -E "CONFIG_PACKAGE_(luci-app-passwall|sing-box|luci-theme-argon|luci-i18n-base-zh-cn|dnsmasq-full|pdnsd-alt)" .config || true

      - name: Download
        run: |
          cd source
          make download -j8 || make download -j1 V=s

      - name: Build
        run: |
          cd source
          make -j$(nproc) || make -j1 V=s

      - name: Prepare firmware
        if: success()
        run: |
          mkdir -p upload
          find source/bin/targets/ -type f \( \
            -name "*.bin" -o \
            -name "*.manifest" -o \
            -name "*.buildinfo" -o \
            -name "*.json" \
          \) -exec cp -f {} upload/ \;
          ls -lah upload

      - name: Upload firmware
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: upload/
          retention-days: 7

      - name: Collect logs on failure
        if: failure()
        run: |
          mkdir -p failed-logs
          cp -f configs/newifi.config failed-logs/newifi.config 2>/dev/null || true
          cp -f source/.config failed-logs/final.config 2>/dev/null || true
          cp -rf source/logs failed-logs/source-logs 2>/dev/null || true
          cp -rf source/tmp failed-logs/source-tmp 2>/dev/null || true

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-build-logs
          path: failed-logs/
          retention-days: 7
