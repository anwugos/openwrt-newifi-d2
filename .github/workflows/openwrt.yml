name: Build OpenWrt

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          df -h

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib gettext \
          git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

      - name: Clone OpenWrt
        run: |
          git clone https://github.com/openwrt/openwrt.git source
          cd source
          git checkout openwrt-24.10

      - name: Update feeds
        run: |
          cd source
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Add third-party packages
        run: |
          cd source

          # Argon theme
          rm -rf package/luci-theme-argon
          rm -rf package/luci-app-argon-config
          git clone https://github.com/jerrykuku/luci-theme-argon.git package/luci-theme-argon
          git clone https://github.com/jerrykuku/luci-app-argon-config.git package/luci-app-argon-config

          # Passwall
          rm -rf package/openwrt-passwall
          git clone https://github.com/xiaorouji/openwrt-passwall.git package/openwrt-passwall

      - name: Load config
        run: |
          cp configs/newifi.config source/.config
          if [ -d files ]; then cp -r files source/files; fi

      - name: Make defconfig
        run: |
          cd source
          make defconfig

      - name: Download packages
        run: |
          cd source
          make download -j8

      - name: Build firmware
        run: |
          cd source
          make -j$(nproc) || make -j1 V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: newifi-d2-openwrt
          path: source/bin/targets/
