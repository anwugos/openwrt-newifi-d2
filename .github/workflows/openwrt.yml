name: Build OpenWrt

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          df -h

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib gettext \
          git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

      - name: Clone OpenWrt
        run: |
          git clone https://github.com/openwrt/openwrt.git source
          cd source
          git checkout openwrt-24.10

      - name: Add feeds
        run: |
          cd source
             echo 'src-git passwall_packages https://github.com/anwugos/openwrt-passwall.git' >> feeds.conf.default
             echo 'src-git passwall_luci https://github.com/OpenWrt-Passwall/openwrt-passwall.git' >> feeds.conf.default
             echo 'src-git argon https://github.com/jerrykuku/luci-theme-argon.git' >> feeds.conf.default
             echo 'src-git argon_config https://github.com/jerrykuku/luci-app-argon-config.git' >> feeds.conf.default

      - name: Update feeds
        run: |
          cd source
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load config
        run: |
          cp configs/newifi.config source/.config
          cd source
          make defconfig

      - name: Download
        run: |
          cd source
          make download -j8

      - name: Build
        run: |
          cd source
          make -j$(nproc) || make -j1 V=s

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: source/bin/targets/
